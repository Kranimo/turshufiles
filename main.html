        body {
            font-family: Arial, sans-serif;
            text-align: center;

        }

        .gallery {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .gallery img {
            width: 18%;   /* small enough so 5 fit in one row */
            min-width: 150px;
            height: auto;
            border-radius: 12px;
            border: 4px solid transparent;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .gallery img:hover {
            transform: scale(1.08);
            border-color: #8f03d0;
        }

        a {
            text-decoration: none;
            color: purple;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
